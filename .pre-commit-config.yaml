repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^Code/kursplaner/.*\.py$
      - id: ruff-format
        files: ^Code/kursplaner/.*\.py$

  - repo: local
    hooks:
      - id: ai-guardrails
        name: ai-guardrails
        entry: python Code/kursplaner/tools/ci/check_ai_guardrails.py
        language: python
        pass_filenames: false
        files: ^Code/kursplaner/

      - id: mypy
        name: mypy
        entry: python Code/kursplaner/tools/ci/run_mypy_hook.py
        language: python
        additional_dependencies: [mypy>=1.10]
        pass_filenames: false
        stages: [pre-push]

      - id: pytest
        name: pytest
        entry: python Code/kursplaner/tools/ci/run_pytest_hook.py
        language: python
        additional_dependencies: [pytest>=8.0, reportlab==4.4.2]
        pass_filenames: false
        stages: [pre-push]
