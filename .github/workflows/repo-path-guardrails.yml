name: Repo Path Guardrails

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  no-absolute-json-paths:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate persisted JSON paths
        run: python tools/repo_ci/check_no_absolute_paths.py
